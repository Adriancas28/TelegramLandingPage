<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Brothers Picks - Acceso VIP</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #fff;
        font-family: "Roboto", sans-serif;
        text-align: center;
        padding: 20px;
      }

      h1 {
        font-family: "Anton", sans-serif;
        font-size: 38px;
        text-transform: uppercase;
      }

      /* Imagen */
      .profile-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        margin: 25px 0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      /* COUNTDOWN */
      .countdown {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }

      .time-box {
        background: black;
        color: white;
        padding: 15px;
        border-radius: 10px;
        min-width: 70px;
      }

      .time-box span {
        font-size: 32px;
        font-weight: bold;
      }

      /* BOTON PRINCIPAL */
      .main-btn {
        background: #39ff14;
        color: black;
        padding: 18px 40px;
        font-weight: 700;
        border-radius: 30px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        font-size: 20px;
        box-shadow: 0 5px 20px rgba(57, 255, 20, 0.5);
        transition: 0.3s;
      }

      .main-btn:hover {
        transform: scale(1.05);
        background: #2de00f;
      }

      /* Flecha */
      .arrow {
        font-size: 22px;
        transition: transform 0.3s;
      }

      .main-btn:hover .arrow {
        transform: translateX(5px);
      }

      /* TEXTOS */
      .subtext {
        font-weight: bold;
      }

      .small-text {
        color: #666;
        margin-top: 20px;
      }

      /* BOTONES STORE */
      .store-btn {
        background: black;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
      }

      .store-btn:hover {
        transform: scale(1.05);
      }

      .store-buttons {
        margin-top: 15px;
      }

      /* ICONOS SIN AZUL */
      svg {
        fill: black;
      }

      .store-btn svg {
        fill: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>MI MEJOR PRONÓSTICO GRATIS PARA HOY ⬇️</h1>

      <img src="./BrotherPicks.jpeg" class="profile-img" />

      <div class="countdown">
        <div class="time-box"><span id="days">00</span><small>Días</small></div>
        <div class="time-box">
          <span id="hours">00</span><small>Horas</small>
        </div>
        <div class="time-box">
          <span id="minutes">15</span><small>Min</small>
        </div>
        <div class="time-box">
          <span id="seconds">00</span><small>Seg</small>
        </div>
      </div>

      <a href="https://t.me/+i9nS2QSLn-UwMTNh" target="_blank" class="main-btn">
        ¡ÚNETE GRATIS A MI CANAL!
        <span class="arrow">→</span>
      </a>

      <p class="subtext">💰 Apuestas profesionales con INFORMACIÓN</p>
      <p class="subtext">🔥 Pronósticos exclusivos GRATIS</p>

      <p class="small-text">¿No tienes Telegram?</p>

      <div class="store-buttons d-flex justify-content-center gap-3 flex-wrap">
        <a
          href="https://play.google.com/store/apps/details?id=org.telegram.messenger"
          class="store-btn"
        >
          ▶ Android
        </a>

        <a
          href="https://apps.apple.com/app/telegram-messenger/id686449807"
          class="store-btn"
        >
          🍎 iPhone
        </a>
      </div>
    </div>

    <script>
      let time = 14 * 60 + 57;

      setInterval(() => {
        if (time > 0) time--;

        let m = Math.floor(time / 60);
        let s = time % 60;

        document.getElementById("minutes").textContent = m
          .toString()
          .padStart(2, "0");
        document.getElementById("seconds").textContent = s
          .toString()
          .padStart(2, "0");
      }, 1000);
    </script>
  </body>
</html>
