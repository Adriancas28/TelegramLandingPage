<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brothers Picks - Acceso VIP</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link rel="icon" type="image/jpeg" href="./BrotherPicks.jpeg">
<style>

body{
    background:#fff;
    font-family:'Roboto',sans-serif;
    text-align:center;
    padding:20px 10px;
}

/* CONTENEDOR */
.container{
    width:100%;
    max-width:100%;
    padding:0 10px;
}

/* TITULO */
h1{
    font-family:'Anton',sans-serif;
    font-size:48px;
    text-transform:uppercase;
    margin-bottom:30px;
    line-height:1.1;
}

/* IMAGEN */
.profile-img{
    width:160px;
    height:160px;
    border-radius:50%;
    margin:25px 0;
    object-fit:cover;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:30px 0;
    flex-wrap:wrap;
}

.time-box{
    background:#000;
    color:#fff;
    padding:18px;
    border-radius:14px;
    min-width:80px;
}

.time-box span{
    font-size:40px;
    font-weight:bold;
    display:block;
}

.time-box small{
    font-size:16px;
}

/* BOTON PRINCIPAL */
.main-btn{
    background:#39ff14;
    color:#000;
    padding:20px 50px;
    font-weight:700;
    border-radius:50px;
    display:inline-flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    font-size:22px;
    box-shadow:0 5px 25px rgba(57,255,20,0.6);
    transition:0.3s;
    margin:25px 0;
    animation:pulse 1.8s infinite;
}

.main-btn:hover{
    transform:scale(1.05);
    background:#2de00f;
    color:#000;
}

.arrow{
    font-size:28px;
    transition:0.3s;
}

.main-btn:hover .arrow{
    transform:translateX(8px);
}

/* TEXTOS */
.subtext{
    font-weight:bold;
    font-size:20px;
    margin-bottom:10px;
}

.small-text{
    color:#666;
    font-size:16px;
    margin:25px 0 15px;
}

/* BOTONES STORE */
.store-buttons{
    margin-top:10px;
}

.store-btn{
    background:#000;
    color:#fff;
    padding:15px 28px;
    border-radius:14px;
    text-decoration:none;
    font-size:18px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    transition:0.3s;
    min-width:290px;
    justify-content:center;
    font-weight:500;
}

.store-btn i{
    font-size:24px;
}

.store-btn:hover{
    transform:scale(1.05);
    color:#fff;
}

/* EFECTO PULSE */
@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(57,255,20,0.7);
    }
    70%{
        box-shadow:0 0 0 15px rgba(57,255,20,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(57,255,20,0);
    }
}

/* RESPONSIVE */
@media(max-width:480px){

    h1{
        font-size:34px;
    }

    .profile-img{
        width:140px;
        height:140px;
    }

    .time-box span{
        font-size:30px;
    }

    .main-btn{
        font-size:18px;
        padding:16px 30px;
    }

    .subtext{
        font-size:17px;
    }

    .store-btn{
        width:100%;
        min-width:100%;
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>MI MEJOR PRONÓSTICO GRATIS PARA HOY 🤟🏻</h1>

<!-- TU IMAGEN ORIGINAL -->
<img src="./BrotherPicks.jpeg" alt="Brothers Picks" class="profile-img">

<!-- CONTADOR -->
<div class="countdown">

    <div class="time-box">
        <span id="days">00</span>
        <small>Días</small>
    </div>

    <div class="time-box">
        <span id="hours">00</span>
        <small>Horas</small>
    </div>

    <div class="time-box">
        <span id="minutes">05</span>
        <small>Minutos</small>
    </div>

    <div class="time-box">
        <span id="seconds">00</span>
        <small>Segundos</small>
    </div>

</div>

<!-- BOTON -->
<a href="https://t.me/+i9nS2QSLn-UwMTNh" target="_blank" class="main-btn">
    ¡ÚNETE GRATIS A MI CANAL!
    <span class="arrow">
        <i class="fa-solid fa-arrow-right"></i>
    </span>
</a>

<p class="subtext">💰 Apuestas profesionales con INFORMACIÓN</p>
<p class="subtext">🔥 Pronósticos exclusivos GRATIS</p>

<p class="small-text">
    ¿No tienes Telegram? Descárgalo aquí
</p>

<!-- BOTONES -->
<div class="store-buttons d-flex justify-content-center gap-3 flex-wrap">

    <!-- PLAY STORE -->
    <a href="https://play.google.com/store/apps/details?id=org.telegram.messenger"
       target="_blank"
       class="store-btn">

        <i class="fa-brands fa-google-play"></i>
        Telegram Play Store

    </a>

    <!-- APPLE STORE -->
    <a href="https://apps.apple.com/app/telegram-messenger/id686449807"
       target="_blank"
       class="store-btn">

        <i class="fa-brands fa-apple"></i>
        Telegram Apple Store

    </a>

</div>

</div>

<!-- SCRIPT -->
<script>

let initialTime = 5 * 60;
let time = initialTime;

setInterval(() => {

    if(time > 0){
        time--;
    }else{
        time = initialTime;
    }

    let d = Math.floor(time / 86400);
    let h = Math.floor((time % 86400) / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = time % 60;

    document.getElementById('days').textContent =
        d.toString().padStart(2, '0');

    document.getElementById('hours').textContent =
        h.toString().padStart(2, '0');

    document.getElementById('minutes').textContent =
        m.toString().padStart(2, '0');

    document.getElementById('seconds').textContent =
        s.toString().padStart(2, '0');

}, 1000);

</script>

</body>
</html>
