<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brothers Picks - Acceso VIP</title>
    <!-- Usamos Google Fonts para una tipografía similar al diseño -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-family: 'Anton', sans-serif;
            font-size: 38px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .time-box {
            background-color: #000000;
            color: #ffffff;
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .time-box span {
            font-size: 38px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .time-box small {
            font-size: 14px;
            font-weight: 700;
            text-transform: capitalize;
        }

        .main-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #0b0914;
            color: #ffffff;
            text-decoration: none;
            padding: 18px 45px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 30px;
            margin-bottom: 30px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .main-btn:hover {
            transform: scale(1.05);
            background-color: #1a1528;
        }

        .main-btn svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            fill: currentColor;
        }

        .subtext {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
        }

        .small-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .store-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .store-btn:hover {
            transform: scale(1.05);
        }

        .store-btn svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            fill: currentColor;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 26px; }
            .time-box { min-width: 60px; padding: 10px 15px; }
            .time-box span { font-size: 28px; }
            .store-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>MI MEJOR PRONÓSTICO GRATIS PARA HOY AQUÍ ⬇️</h1>
        
        <!-- Aquí va la foto. Usa un enlace temporal hasta que me pases la imagen real -->
        <img src="https://via.placeholder.com/150x150/EEEEEE/999999?text=FOTO" alt="Perfil" class="profile-img" id="profile-picture">

        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <small>Días</small>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <small>Horas</small>
            </div>
            <div class="time-box">
                <span id="minutes">14</span>
                <small>Minutos</small>
            </div>
            <div class="time-box">
                <span id="seconds">57</span>
                <small>Segundo</small>
            </div>
        </div>

        <!-- Enlace del grupo de Telegram actualizado -->
        <a href="https://t.me/+i9nS2QSLn-UwMTNh" class="main-btn" target="_blank">
            <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.123-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            ¡ÚNETE GRATIS A MI CANAL!
        </a>

        <p class="subtext">💰 ¡Apuestas profesionales con INFORMACIÓN! Pronósticos exclusivos GRATIS. 💥</p>
        <p class="subtext" style="margin-bottom: 25px;">¡Únete a mi grupo gratuito ahora! ⬇️</p>

        <p class="small-text">¿No tienes Telegram? Descárgalo aquí</p>

        <div class="store-buttons">
            <a href="https://play.google.com/store/apps/details?id=org.telegram.messenger" class="store-btn" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M3 20.5v-17c0-.83.67-1.5 1.5-1.5.38 0 .74.15 1.01.42l11.45 11.45L3 20.5zM17.47 13.38L21 11.33c.6-.33.6-.86 0-1.2l-3.53-2.05-3.32 3.32 3.32 3.31V13.38z"/></svg>
                Telegram Play Store
            </a>
            <a href="https://apps.apple.com/app/telegram-messenger/id686449807" class="store-btn" target="_blank">
                <!-- Simple iOS icon placeholder using text for simplicity -->
                Apple Store
            </a>
        </div>
    </div>

    <script>
        // Inicia en 14 minutos 57 segundos tal como en tu imagen
        let time = 14 * 60 + 57; 
        const dEl = document.getElementById('days');
        const hEl = document.getElementById('hours');
        const mEl = document.getElementById('minutes');
        const sEl = document.getElementById('seconds');

        setInterval(() => {
            if(time <= 0) time = 0;
            else time--;
            
            const d = Math.floor(time / 86400);
            const h = Math.floor((time % 86400) / 3600);
            const m = Math.floor((time % 3600) / 60);
            const s = time % 60;

            dEl.textContent = d.toString().padStart(2, '0');
            hEl.textContent = h.toString().padStart(2, '0');
            mEl.textContent = m.toString().padStart(2, '0');
            sEl.textContent = s.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
